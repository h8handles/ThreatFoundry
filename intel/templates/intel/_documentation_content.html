<div class="content-header">
    <h2 id="doc-title">
        {% if current_doc %}
            {{ current_doc|cut:".md"|title }}
        {% else %}
            Documentation
        {% endif %}
    </h2>
    <div class="meta" id="doc-meta">
        {% if current_doc %}
            Current page: {{ current_doc }}
        {% else %}
            No page selected
        {% endif %}
    </div>
</div>

<div class="doc-content" id="doc-content">
    {% if html_content %}
        {{ html_content|safe }}
    {% else %}
        <p class="empty-state">No documentation content available.</p>
    {% endif %}
</div>
